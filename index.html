<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Yoon Wati Aung 🍓❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --strawberry-red: #ff2a54;
            --glow-color: rgba(255, 42, 84, 0.6);
            --deep-red: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c1 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Floating Background Elements */
        .float-element {
            position: absolute;
            top: -10%;
            font-size: 24px;
            animation: float 6s linear infinite;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            padding: 2.5rem 2rem;
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(201, 24, 74, 0.25);
            text-align: center;
            z-index: 10;
            border: 3px solid #fff;
            width: 360px;
            max-width: 90vw;
            box-sizing: border-box;
            position: relative;
        }

        /* Photo Container */
        .photo-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem auto;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--strawberry-red);
            box-shadow: 0 8px 20px rgba(255, 42, 84, 0.3);
        }

        .photo-container::before {
            content: '🍓';
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 28px;
            transform: rotate(15deg);
        }

        .photo-container::after {
            content: '🍓';
            position: absolute;
            bottom: -5px;
            left: -5px;
            font-size: 28px;
            transform: rotate(-15deg);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--deep-red);
            font-size: 2.4rem;
            margin: 0 0 20px 0;
            line-height: 1.3;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 70px;
            margin-top: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn {
            background: linear-gradient(45deg, #ff4d6d, #ff2a54);
            color: white;
            position: relative;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(255, 42, 84, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.3);
            background: var(--deep-red);
            box-shadow: 0 0 25px 12px var(--glow-color);
            animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px 5px var(--glow-color); }
            50% { box-shadow: 0 0 35px 18px var(--glow-color); }
            100% { box-shadow: 0 0 15px 5px var(--glow-color); }
        }

        #noBtn {
            background: #a8a8a8;
            color: white;
            position: relative;
            z-index: 999;
            touch-action: none;
            user-select: none;
        }

        #message {
            display: none;
            color: var(--deep-red);
            font-family: 'Dancing Script', cursive;
            font-size: 2.3rem;
            line-height: 1.3;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="main-content">
            <div class="photo-container">
                <img src="https://i.ibb.co/xtjgb5dN/photo-2026-07-07-20-54-01.jpg" alt="Yoon Wati Aung">
            </div>

            <h1>Wati 🍓<br>Can we be relationship in one day? 💍✨</h1>
            
            <div class="btn-group">
                <button id="yesBtn" onclick="celebrate()">YES! 🍓</button>
                <button id="noBtn">No 🥺</button>
            </div>
        </div>

        <div id="message">
            She said YES! 🍓❤️<br>I love you forever, Wati! 🥰
        </div>
    </div>

    <script>
        // Floating elements background
        const symbols = ['🍓', '❤️', '🍓', '💖', '🍓', '✨'];

        function createFloatingElement() {
            const el = document.createElement('div');
            el.classList.add('float-element');
            el.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 2 + 3) + 's';
            el.style.fontSize = (Math.random() * 12 + 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }
        setInterval(createFloatingElement, 300);

        const noBtn = document.getElementById('noBtn');

        // Move the button with guaranteed jump distance
        function moveButton() {
            const minDistance = 120; // Minimum distance to jump away
            const maxDistance = 220; // Maximum distance to jump away

            // Generate a random angle
            const angle = Math.random() * Math.PI * 2;
            
            // Generate a distance between minDistance and maxDistance
            const distance = minDistance + Math.random() * (maxDistance - minDistance);

            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        function celebrate() {
            confetti({
                particleCount: 250,
                spread: 120,
                origin: { y: 0.6 },
                colors: ['#ff2a54', '#ff4d6d', '#ffffff', '#ffccd5']
            });
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            noBtn.style.display = 'none';
        }
    </script>
</body>
</html>
